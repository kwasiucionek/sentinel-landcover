services:
  postgis:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: sentinel_landcover
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel_pass
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel_landcover"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.11.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data/analyses:/app/data/analyses
      - ./data/processed:/app/data/processed
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - POSTGIS_HOST=postgis
      - POSTGIS_PORT=5432
      - POSTGIS_DB=sentinel_landcover
      - POSTGIS_USER=sentinel
      - POSTGIS_PASSWORD=sentinel_pass
      - OLLAMA_HOST=${OLLAMA_HOST}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - CDSE_CLIENT_ID=${CDSE_CLIENT_ID}
      - CDSE_CLIENT_SECRET=${CDSE_CLIENT_SECRET}
      - CDSE_INSTANCE_ID=${CDSE_INSTANCE_ID}
    depends_on:
      postgis:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

volumes:
  postgis_data:
  qdrant_data:
